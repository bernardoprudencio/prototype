name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - new-modification
      - ongoing-relationships

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build (main)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Build (new-modification)
        if: github.ref == 'refs/heads/new-modification'
        run: VITE_BASE=/prototype/new-modification/ npm run build

      - name: Build (ongoing-relationships)
        if: github.ref == 'refs/heads/ongoing-relationships'
        run: VITE_BASE=/prototype/ongoing-relationships/ npm run build

      - name: Deploy main → root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true

      - name: Deploy new-modification → subdirectory
        if: github.ref == 'refs/heads/new-modification'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: new-modification
          keep_files: true

      - name: Deploy ongoing-relationships → subdirectory
        if: github.ref == 'refs/heads/ongoing-relationships'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ongoing-relationships
          keep_files: true
