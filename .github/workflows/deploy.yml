name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - new-modification
      - ongoing-relationships
      - user-testing-ongoing-relationships-v1
      - claude/trusting-banzai
      - claude/modest-visvesvaraya

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build (main)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Build (new-modification)
        if: github.ref == 'refs/heads/new-modification'
        run: VITE_BASE=/prototype/new-modification/ npm run build

      - name: Build (ongoing-relationships)
        if: github.ref == 'refs/heads/ongoing-relationships'
        run: VITE_BASE=/prototype/ongoing-relationships/ npm run build

      - name: Deploy main → root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true

      - name: Deploy new-modification → subdirectory
        if: github.ref == 'refs/heads/new-modification'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: new-modification
          keep_files: true

      - name: Deploy ongoing-relationships → subdirectory
        if: github.ref == 'refs/heads/ongoing-relationships'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ongoing-relationships
          keep_files: true

      - name: Build (user-testing-ongoing-relationships-v1)
        if: github.ref == 'refs/heads/user-testing-ongoing-relationships-v1'
        run: VITE_BASE=/prototype/user-testing-ongoing-relationships-v1/ npm run build

      - name: Deploy user-testing-ongoing-relationships-v1 → subdirectory
        if: github.ref == 'refs/heads/user-testing-ongoing-relationships-v1'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: user-testing-ongoing-relationships-v1
          keep_files: true

      - name: Build (claude/trusting-banzai)
        if: github.ref == 'refs/heads/claude/trusting-banzai'
        run: VITE_BASE=/prototype/trusting-banzai/ npm run build

      - name: Deploy claude/trusting-banzai → subdirectory
        if: github.ref == 'refs/heads/claude/trusting-banzai'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: trusting-banzai
          keep_files: true

      - name: Build (claude/modest-visvesvaraya)
        if: github.ref == 'refs/heads/claude/modest-visvesvaraya'
        run: VITE_BASE=/prototype/modest-visvesvaraya/ npm run build

      - name: Deploy claude/modest-visvesvaraya → subdirectory
        if: github.ref == 'refs/heads/claude/modest-visvesvaraya'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: modest-visvesvaraya
          keep_files: true
